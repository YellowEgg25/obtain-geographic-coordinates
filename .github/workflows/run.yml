name: Daily Geocode

on:
  schedule:
    - cron: '0 21 * * *'   # 每天 UTC 2点（北京时间10点）
  workflow_dispatch:      # 允许手动运行

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行脚本
        env:
          BAIDU_AK: ${{ secrets.BAIDU_AK }}
        run: |
          python geocode.py

      - name: 提交结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update geocode progress" || echo "No changes"
          git push
